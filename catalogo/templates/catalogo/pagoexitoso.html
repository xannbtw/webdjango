{% extends 'catalogo/base.html' %}

{% block content %}
<section class="pago-exitoso-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="pago-exitoso-card text-center">

          <div class="pago-exitoso-icon">
            <i class="bi bi-check-circle-fill"></i>
          </div>

          <h2 class="pago-exitoso-titulo font-playfair">¡Pedido confirmado!</h2>
          <p class="pago-exitoso-texto">
            Gracias por tu compra en Nomade Kafé. Tu pedido ha sido registrado y pronto estará listo.
          </p>

          {% if pedido_id %}
          <div class="pago-exitoso-numero">
            Pedido <strong>#{{ pedido_id }}</strong>
          </div>
          {% endif %}

          <div class="d-flex flex-column gap-2 mt-4">
            <a href="{% url 'menu' %}" class="btn pago-exitoso-btn-primary">
              <i class="bi bi-cup-hot me-2"></i>Seguir comprando
            </a>
            <a href="{% url 'inicio' %}" class="btn pago-exitoso-btn-secondary">
              Volver al inicio
            </a>
          </div>

        </div>
      </div>
    </div>
  </div>
</section>
{% endblock content %}
