{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
        <link rel="stylesheet" href="{% static 'catalogo/css/style.css' %}">
        <script src="" async defer></script>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg custom-navbar">
            <div class="container">

                <a class="navbar-brand d-flex align-items-center" href="{% url 'inicio' %}">
                    <i class="bi bi-cup-hot brand-icon"></i> 
                    <span class="brand-text ms-2">Nomade</span>
                </a>

                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNomade">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNomade">

                    <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" href="{% url 'inicio' %}">Inicio</a>
                        </li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'nuestro_cafe' %}">Nuestro Café</a></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'menu' %}">Menú</a></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'nosotros' %}">Nosotros</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Ubicación</a></li>
                    </ul>

                    <div class="d-flex align-items-center gap-3">
                        <a href="#" class="position-relative text-dark text-decoration-none p-2">
                            <i class="bi bi-bag fs-5"></i>
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill" style="background-color: var(--primary); font-size: 0.75rem;">
                                0
                            </span>
                        </a>
                        
                        {% if user.is_authenticated %}
                            <div class="d-flex align-items-center gap-2">
                                <span class="text-muted small d-none d-md-block">Hola, {{ user.username }}</span>
                                <a href="#" class="btn btn-outline-dark rounded-pill px-4">Salir</a>
                            </div>
                        {% else %}
                            <a href="#" class="btn btn-primary-custom rounded-pill px-4 shadow-sm">Iniciar Sesión</a>
                        {% endif %}
                    </div>


                </div>
                
            </div>
        </nav>

        {% block content %}
        {% endblock content %}
        
    </body>
</html>
