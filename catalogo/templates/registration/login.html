{% extends 'catalogo/base.html' %}
{% load static %}
 
{% block content %}
 
<!-- Overlay de fondo -->
<div class="login-overlay" id="loginOverlay">
 
  <!-- Modal centrado -->
  <div class="login-modal" id="loginModal">
 
    <button class="login-close" onclick="window.location.href='/'">✕</button>
 
    <div class="login-modal-header">
      <div class="login-logo">
        <i class="bi bi-cup-hot"></i>
      </div>
      <h2 class="login-title font-playfair">Bienvenido</h2>
      <p class="login-subtitle">Inicia sesión para continuar</p>
    </div>
 
    {% if form.errors %}
    <div class="login-error">
      Usuario o contraseña incorrectos. Intenta de nuevo.
    </div>
    {% endif %}
 
    <form method="post" class="login-form">
      {% csrf_token %}
 
      <div class="login-field">
        <label for="id_username">Usuario</label>
        <input
          type="text"
          name="username"
          id="id_username"
          class="login-input"
          placeholder="Tu nombre de usuario"
          autofocus
          autocomplete="username"
          required
        >
      </div>
 
      <div class="login-field">
        <label for="id_password">Contraseña</label>
        <input
          type="password"
          name="password"
          id="id_password"
          class="login-input"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        >
      </div>
 
      <button type="submit" class="login-btn">Entrar</button>
    </form>
 
    <div class="login-footer">
      ¿No tienes cuenta? <a href="{% url 'registro' %}">Regístrate</a>
    </div>
 
  </div>
</div>
 
<style>
.login-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1050;
  padding: 1rem;
  animation: fadeIn 0.2s ease;
}
 
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
 
.login-modal {
  background: #fff;
  border-radius: 20px;
  padding: 2.5rem 2rem;
  width: 100%;
  max-width: 400px;
  position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  animation: slideUp 0.25s ease;
}
 
@keyframes slideUp {
  from { transform: translateY(30px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
 
.login-close {
  position: absolute;
  top: 1rem;
  right: 1rem;
  background: #f3f4f6;
  border: none;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #6b7280;
  transition: background 0.15s;
}
.login-close:hover { background: #e5e7eb; color: #111; }
 
.login-modal-header {
  text-align: center;
  margin-bottom: 1.75rem;
}
 
.login-logo {
  width: 52px;
  height: 52px;
  background: var(--primary, #c47b5a);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 1rem;
}
.login-logo i {
  font-size: 22px;
  color: #fff;
}
 
.login-title {
  font-size: 22px;
  font-weight: 600;
  color: #111;
  margin-bottom: 0.25rem;
}
 
.login-subtitle {
  font-size: 13.5px;
  color: #6b7280;
  margin: 0;
}
 
.login-error {
  background: #fef2f2;
  border: 1px solid #fecaca;
  color: #dc2626;
  border-radius: 10px;
  padding: 0.6rem 1rem;
  font-size: 13px;
  margin-bottom: 1.25rem;
  text-align: center;
}
 
.login-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
 
.login-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
 
.login-field label {
  font-size: 12.5px;
  font-weight: 600;
  color: #374151;
  letter-spacing: 0.02em;
}
 
.login-input {
  width: 100%;
  padding: 0.65rem 1rem;
  border: 1.5px solid #e5e7eb;
  border-radius: 50px;
  font-size: 14px;
  font-family: inherit;
  color: #111;
  background: #f9fafb;
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}
.login-input:focus {
  border-color: var(--primary, #c47b5a);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(196, 123, 90, 0.15);
}
.login-input::placeholder { color: #9ca3af; }
 
.login-btn {
  width: 100%;
  padding: 0.75rem;
  background: var(--primary, #c47b5a);
  color: #fff;
  border: none;
  border-radius: 50px;
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  margin-top: 0.25rem;
  transition: background 0.2s, transform 0.1s;
  letter-spacing: 0.02em;
}
.login-btn:hover  { background: #b36a49; }
.login-btn:active { transform: scale(0.98); }
 
.login-footer {
  text-align: center;
  margin-top: 1.25rem;
  font-size: 13px;
  color: #6b7280;
}
.login-footer a {
  color: var(--primary, #c47b5a);
  text-decoration: none;
  font-weight: 500;
}
.login-footer a:hover { text-decoration: underline; }
 
/* Ocultar el navbar y footer mientras el modal está abierto */
body.login-open nav,
body.login-open footer { filter: blur(2px); pointer-events: none; }
</style>
 
<script>
document.body.classList.add('login-open');
// Cerrar con Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') window.location.href = '/';
});
// Cerrar al click en el overlay (fuera del modal)
document.getElementById('loginOverlay').addEventListener('click', function(e) {
  if (e.target === this) window.location.href = '/';
});
</script>
 
{% endblock content %}
